<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Careerkick NEET Advisor | Expert Guidance for NEET & BAMS Colleges</title>
    <meta
      name="title"
      content="Careerkick NEET Advisor | Expert Guidance for NEET & BAMS Colleges"
    />
    <meta
      name="description"
      content="Get expert NEET counseling, BAMS college guidance, admission support, and personalized career advice with Careerkick. Trusted platform for Indian medical aspirants."
    />
    <meta
      name="keywords"
      content="NEET advisor, BAMS colleges India, NEET counseling, medical admission guidance, Careerkick, NEET UG help, BAMS admission India, MBBS counseling India"
    />
    <meta name="author" content="Careerkick Services" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://careerkick.in/" />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://careerkick.in/" />
    <meta
      property="og:title"
      content="Careerkick NEET Advisor | Expert Guidance for NEET & BAMS Colleges"
    />
    <meta
      property="og:description"
      content="Personalized NEET & BAMS admission guidance. Get expert counseling and secure your medical career with Careerkick."
    />
    <meta property="og:image" content="https://careerkick.in/logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://careerkick.in/" />
    <meta
      name="twitter:title"
      content="Careerkick NEET Advisor | Expert Guidance for NEET & BAMS Colleges"
    />
    <meta
      name="twitter:description"
      content="Expert NEET counseling and BAMS college guidance for Indian students. Start your medical journey with Careerkick."
    />
    <meta name="twitter:image" content="https://careerkick.in/logo.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Geo (India Targeting) -->
    <meta name="geo.region" content="IN-UP" />
    <meta name="geo.placename" content="India" />

    <!-- Preconnect (Performance Boost) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured Data (Organization Schema) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "EducationalOrganization",
        "name": "Careerkick Services",
        "url": "https://careerkick.in/",
        "logo": "https://careerkick.in/logo.png",
        "description": "NEET counseling and BAMS admission guidance platform in India.",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "117/N/65, 2nd Floor, Raniganj, Ambedkar Nagar, Kakadeo",
          "addressLocality": "Kanpur",
          "addressRegion": "Uttar Pradesh",
          "postalCode": "208025",
          "addressCountry": "IN"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer support",
          "email": "careerkick01@gmail.com"
        }
      }
    </script>
  </head>

  <body>
    <!-- React Root -->
    <div id="root"></div>

    <!-- Main Script -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
